# daily-supply-news-digest 配置文件

# API 配置
api:
  base_url: https://news.yrules.com
  # API key 从环境变量 SCIAI_API_KEY 读取

# 默认参数
defaults:
  article_count: 6
  min_articles: 4
  max_articles: 8
  language: zh
  output_mode: console  # console | file | both

# DashScope 配置
dashscope:
  model: qwen-plus
  timeout: 300
  # API key 从环境变量 DASHSCOPE_API_KEY 读取

# 输出配置
output:
  # file 模式的保存目录
  directory: ~/GitHub_Source_Code/Supply-New-Agent/reports/daily
  # 文件名格式
  filename_format: "{date}.md"

# 订阅引导链接
subscription_url: https://accounts.yrules.com
contact_email: marketing@yrules.com

# 板块过滤映射
focus_mapping:
  logistics: "物流与运输"
  esg: "可持续发展"
  ai: "科技创新"
  finance: "采购与供应商"
  procurement: "采购与供应商"

# 地理区域（用于多样性检查）
regions:
  - 北美
  - 欧洲
  - 中东
  - 东南亚
  - 中国
  - 日韩
  - 南亚
  - 拉丁美洲
  - 非洲
  - 全球

# 板块分类（用于多样性检查）
sectors:
  - 物流
  - 采购
  - 制造
  - ESG
  - AI与科技
  - 金融
  - 政策
  - 风险
